<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teams - 白波瀬 智将</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="teams-container">
        <!-- Top Bar -->
        <header class="top-bar">
            <div class="top-left">
                <div class="teams-logo">
                    <i class="fab fa-microsoft"></i>
                </div>
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="検索">
                </div>
            </div>
            
            <div class="top-right">
                <div class="user-info">
                    <img src="https://i.pravatar.cc/32?u=shirahase" alt="" class="user-avatar">
                    <span>白波瀬 智将</span>
                </div>
            </div>
        </header>

        <div class="main-content">
            <!-- Sidebar -->
            <nav class="sidebar">
                <div class="nav-item active"><i class="fas fa-comment-dots"></i><span>チャット</span></div>
                <div class="nav-item"><i class="fas fa-users"></i><span>チーム</span></div>
                <div class="nav-item"><i class="fas fa-calendar"></i><span>予定表</span></div>
                <div class="nav-item"><i class="fas fa-phone"></i><span>通話</span></div>
            </nav>

            <!-- Chat List -->
            <div class="chat-list">
                <div class="chat-list-header">
                    <h3>チャット</h3>
                </div>
                
                <div class="chat-item active">
                    <img src="https://i.pravatar.cc/40?u=shirahase" alt="">
                    <div class="chat-info">
                        <div class="chat-name">白波瀬 智将 <span class="status"></span></div>
                        <div class="chat-preview">あなた: 12/24 13:00か...</div>
                    </div>
                    <div class="chat-time">12:36</div>
                </div>
            </div>

            <!-- Chat Area -->
            <div class="chat-area">
                <div class="chat-header">
                    <div class="chat-header-left">
                        <img src="https://i.pravatar.cc/40?u=shirahase" alt="">
                        <div>
                            <h2>白波瀬 智将</h2>
                            <span class="online-status">オンライン</span>
                        </div>
                    </div>
                </div>

                <div class="messages" id="messages"></div>

                <div class="message-input-area">
                    <div class="input-toolbar">
                        <i class="fas fa-plus"></i>
                        <i class="far fa-smile"></i>
                        <i class="fas fa-paperclip"></i>
                    </div>
                    <div class="input-box">
                        <input type="text" id="message-input" placeholder="新しいメッセージの入力" onkeypress="if(event.key==='Enter') sendMessage()">
                        <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
