<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>チャット | なつき | Microsoft Teams</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Left Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-comment-dots"></i>
                <span>チャット</span>
            </div>
            <div class="chat-list">
                <div class="chat-item active">
                    <div class="avatar">🌸</div>
                    <div class="chat-info">
                        <div class="chat-name">なつき</div>
                        <div class="chat-preview">了解！楽しみにしてるね〜</div>
                    </div>
                    <div class="chat-time">13:42</div>
                </div>
            </div>
        </div>

        <!-- Main Chat Area -->
        <div class="chat-main">
            <!-- Top Header -->
            <div class="chat-header">
                <div class="header-left">
                    <div class="avatar big">🌸</div>
                    <div>
                        <h2>なつき</h2>
                        <span class="status">オンライン</span>
                    </div>
                </div>
            </div>

            <!-- Messages -->
            <div class="messages" id="messages"></div>

            <!-- Input Area -->
            <div class="message-input-area">
                <div class="input-box">
                    <input type="text" id="message-input" placeholder="メッセージを入力" onkeypress="if(event.key === 'Enter') sendMessage()">
                    <button onclick="sendMessage()">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
